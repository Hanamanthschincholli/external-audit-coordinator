version: "3.9"

# ══════════════════════════════════════════════════════════════
#  External Audit Coordinator — Docker Compose
#  Start everything:  docker-compose up --build
#  Stop everything:   docker-compose down
# ══════════════════════════════════════════════════════════════

services:

  # ── 1. PostgreSQL 15 ───────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: audit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       audit_db
      POSTGRES_USER:     audit_user
      POSTGRES_PASSWORD: audit_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit_user -d audit_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Redis 7 ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: audit_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 3. Spring Boot Backend (port 8080) ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: audit_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_URL:          jdbc:postgresql://postgres:5432/audit_db
      DB_USERNAME:     audit_user
      DB_PASSWORD:     audit_pass
      REDIS_HOST:      redis
      REDIS_PORT:      "6379"
      AI_SERVICE_URL:  http://ai-service:5000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── 4. Flask AI Microservice (port 5000) ───────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: audit_ai
    restart: unless-stopped
    env_file: .env
    environment:
      FLASK_PORT: "5000"
    ports:
      - "5000:5000"
    volumes:
      # Persist ChromaDB vector store between restarts
      - chroma_data:/app/chroma_store

  # ── 5. React Frontend served by Nginx (port 80) ────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: audit_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
      VITE_AI_BASE_URL:  http://localhost:5000

volumes:
  postgres_data:
  chroma_data:
