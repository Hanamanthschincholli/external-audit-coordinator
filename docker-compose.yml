services:

  postgres:
    image: postgres:15
    container_name: audit_db
    environment:
      POSTGRES_DB: audit_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: audit_backend
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - redis