spring:
  application:
    name: external-audit-coordinator

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/audit_db}
    username: ${DB_USERNAME:audit_user}
    password: ${DB_PASSWORD:audit_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:my-very-secure-secret-key-that-is-long-enough}
  expirationMs: ${JWT_EXPIRATION:86400000}

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# AI service base URL (used by scheduler / service layer)
ai:
  service:
    base-url: ${AI_SERVICE_URL:http://localhost:5000}
