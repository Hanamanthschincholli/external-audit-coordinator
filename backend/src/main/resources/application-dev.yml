spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/audit_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  data:
    redis:
      host: redis
      port: 6379
management:
  endpoints:
    web:
      exposure:
        include: "*"
server:
  port: 8080
logging:
  level:
    root: INFO
    com.internship.tool: DEBUG
