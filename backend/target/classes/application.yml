spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/audit_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: redis
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8082

logging:
  level:
    root: INFO
    com.internship.tool: DEBUG