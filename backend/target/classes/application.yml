spring:
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://postgres:5432/audit_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080

logging:
  level:
    root: INFO
    com.internship.tool: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always

info:
  app:
    name: External Audit Coordinator
    version: 1.0
    description: Backend service for audit management system
    com.internship.tool: DEBUG
